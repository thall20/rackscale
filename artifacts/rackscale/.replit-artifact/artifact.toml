kind = "web"
previewPath = "/"
title = "RackScale"
version = "1.0.0"
id = "artifacts/rackscale"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23697

[services.development]
run = "pnpm --filter @workspace/rackscale run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rackscale", "run", "build" ]
publicDir = "artifacts/rackscale/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23697"
BASE_PATH = "/"
